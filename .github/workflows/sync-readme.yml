name: Sync README Tables

on:
  push:
    branches: [main]
    paths:
      - '.github/agents/**'
      - '.github/skills/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/hooks/**'
      - 'scripts/readme-meta.json'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run sync-readme
        run: bash scripts/sync-readme.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet README.md README.zh-TW.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.zh-TW.md
          git commit -m "docs(readme): auto-sync tables from frontmatter [skip ci]"
          git push
