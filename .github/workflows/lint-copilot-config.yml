name: Lint Copilot Config

on:
  pull_request:
    paths:
      - '.github/agents/**'
      - '.github/skills/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/hooks/**'
      - 'scripts/readme-meta.json'
      - '**/*.md'
      - '**/*.json'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate frontmatter schema
        run: bash scripts/validate-frontmatter.sh

      - name: Check cross-references
        run: bash scripts/lint-copilot-config.sh

      - name: Validate JSON
        run: jq empty scripts/readme-meta.json .github/hooks/*.json

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
