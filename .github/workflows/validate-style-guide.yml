name: Validate STYLE-GUIDE

on:
  pull_request:
    paths:
      - '.github/**/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run STYLE-GUIDE validation
        run: bash .github/scripts/validate-style-guide.sh
