name: Validate STYLE-GUIDE

on:
  pull_request:
    paths:
      - '.github/**/*.md'
      - '.github/scripts/validate-style-guide.sh'
      - '.github/hooks/**'
      - '.github/workflows/validate-style-guide.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run STYLE-GUIDE validation
        run: bash .github/scripts/validate-style-guide.sh

      - name: Run hook regression tests
        run: bash .github/hooks/scripts/test-block-dangerous-commands.sh
